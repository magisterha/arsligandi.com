<!DOCTYPE html>
<html lang="zh-TW"> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>法學分析與裁判預測請求 | Ars Ligandi</title>
    <meta name="description" content="申請由 AI 驅動的大規模法學分析與裁判預測，專為頂級法律專業人士打造。">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Noto Sans TC', sans-serif; scroll-behavior: smooth; }
        .glass-effect { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
        .gradient-text { background: linear-gradient(90deg, #f8fafc, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        textarea::-webkit-scrollbar { width: 8px; }
        textarea::-webkit-scrollbar-track { background: #0f172a; border-radius: 8px; }
        textarea::-webkit-scrollbar-thumb { background: #334155; border-radius: 8px; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 antialiased min-h-screen flex flex-col">

    <header class="fixed w-full z-50 glass-effect border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="index.html" class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-slate-900 rounded-lg flex items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" />
                        </svg>
                    </div>
                    <span class="text-xl font-bold tracking-tight text-slate-900 uppercase">Ars Ligandi</span>
                </a>
                <div class="flex items-center gap-4">
                    <a href="index.html" class="text-sm font-medium text-slate-600 hover:text-indigo-600 transition-colors">返回首頁</a>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-grow pt-32 pb-20 relative overflow-hidden">
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full h-full opacity-10 pointer-events-none z-0">
            <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-cyan-500 blur-[120px]"></div>
        </div>

        <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
            <div class="mb-10 text-center">
                <div class="inline-block mb-4 px-4 py-1.5 rounded-full border border-cyan-500/30 bg-cyan-500/10 text-cyan-400 text-sm font-semibold tracking-wider uppercase">
                    智能作業模組
                </div>
                <h1 class="text-3xl md:text-5xl font-bold text-white mb-4">
                    法學分析與裁判預測請求
                </h1>
                <p class="text-lg text-slate-400 max-w-2xl mx-auto">
                    請詳細說明您的需求，包含特定法院、法官、案件背景或特定法律見解。我們的 AI 代理人將進行深度處理，您將於 <strong>24 小時內</strong>收到詳盡的分析報告。
                </p>
            </div>

            <div class="bg-slate-950 border border-slate-800 p-8 md:p-10 rounded-2xl shadow-2xl relative">
                
                <script>var submitted = false;</script>
                <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="if(submitted) { document.getElementById('form-container').style.display='none'; document.getElementById('success-message').style.display='block'; window.scrollTo(0, 0); }"></iframe>
                
                <div id="form-container">
                    <form action="https://docs.google.com/forms/d/e/1FAIpQLScY3XDWHaHtw4QWjdP_zD-79Yu9OZMwEnFvAjoLMXQYqMnQGA/formResponse" method="POST" target="hidden_iframe" onsubmit="submitted=true;">
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                            <!-- Nombre -->
                            <div>
                                <label class="block text-sm font-medium text-slate-300 mb-2" for="nombre">姓名 / 稱呼</label>
                                <input type="text" name="entry.973265753" id="nombre" required placeholder="請輸入您的姓名" 
                                    class="w-full bg-slate-900 border border-slate-700 text-white px-4 py-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500 transition-all">
                            </div>

                            <!-- Email -->
                            <div>
                                <label class="block text-sm font-medium text-slate-300 mb-2" for="email">專業電子郵箱</label>
                                <input type="email" name="entry.1341956088" id="email" required placeholder="example@lawfirm.com.tw" 
                                    class="w-full bg-slate-900 border border-slate-700 text-white px-4 py-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500 transition-all">
                            </div>
                        </div>

                        <!-- Detalles -->
                        <div class="mb-6">
                            <label class="block text-sm font-medium text-slate-300 mb-2" for="prompt">請求詳情（背景、法院、法官、案件類型）</label>
                            <textarea name="entry.87196961" id="prompt" required rows="6" 
                                placeholder="請描述案件背景、管轄法院、承辦法官及所需分析之重點..." 
                                class="w-full bg-slate-900 border border-slate-700 text-white px-4 py-4 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500 transition-all resize-none"></textarea>
                        </div>

                        <!-- Prioridad -->
                        <div class="mb-8">
                            <label class="block text-sm font-medium text-slate-300 mb-3">分析請求的優先級</label>
                            <div class="flex flex-col sm:flex-row gap-4 sm:gap-8">
                                <label class="flex items-center space-x-3 cursor-pointer group">
                                    <input type="radio" name="entry.767559107" value="普通" required class="w-4 h-4 text-cyan-500 bg-slate-900 border-slate-700 focus:ring-cyan-500">
                                    <span class="text-slate-400 group-hover:text-slate-200 transition-colors">普通 (Normal)</span>
                                </label>
                                <label class="flex items-center space-x-3 cursor-pointer group">
                                    <input type="radio" name="entry.767559107" value="緊急" class="w-4 h-4 text-cyan-500 bg-slate-900 border-slate-700 focus:ring-cyan-500">
                                    <span class="text-slate-400 group-hover:text-slate-200 transition-colors">緊急 (Urgente)</span>
                                </label>
                                <label class="flex items-center space-x-3 cursor-pointer group">
                                    <input type="radio" name="entry.767559107" value="非常緊急" class="w-4 h-4 text-cyan-500 bg-slate-900 border-slate-700 focus:ring-cyan-500">
                                    <span class="text-slate-400 group-hover:text-slate-200 transition-colors">非常緊急 (Muy Urgente)</span>
                                </label>
                            </div>
                        </div>

                        <div class="flex justify-end pt-4 border-t border-slate-800">
                            <button type="submit" class="bg-cyan-600 text-white px-8 py-4 rounded-lg font-bold hover:bg-cyan-500 transition-all shadow-lg shadow-cyan-900/50 flex items-center gap-2 group">
                                <span>部署 AI 代理人進行分析</span>
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 transform group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                                </svg>
                            </button>
                        </div>
                    </form>
                </div>

                <div id="success-message" style="display: none;" class="text-center py-10">
                    <div class="w-20 h-20 bg-green-500/10 rounded-full flex items-center justify-center mx-auto mb-6 border border-green-500/30">
                        <svg class="w-10 h-10 text-green-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                        </svg>
                    </div>
                    <h3 class="text-2xl font-bold text-white mb-2">請求已成功送出</h3>
                    <p class="text-slate-400">我們的 AI 系統已開始處理您的請求。您將於 24 小時內在信箱收到詳盡的分析報告。</p>
                    <button onclick="window.location.reload();" class="mt-8 text-cyan-400 hover:text-cyan-300 text-sm font-medium transition-colors">
                        提交新請求
                    </button>
                </div>

            </div>
        </div>
    </main>

    <footer class="py-8 bg-slate-950 border-t border-slate-900">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-sm text-slate-500">
            <p>© 2026 Ars Ligandi. 位於台灣台北 (Sede en Taipéi, Taiwán)</p>
        </div>
    </footer>

</body>
</html>
